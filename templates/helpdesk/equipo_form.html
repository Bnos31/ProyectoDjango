{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm mt-3">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">{% if object %}Editar{% else %}Nuevo{% endif %} Equipo</h4>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}

                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary">Guardar Configuración</button>
                        <a href="{% url 'equipo_list' %}" class="btn btn-light">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
